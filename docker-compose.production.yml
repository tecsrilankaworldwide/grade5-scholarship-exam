version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: exam-mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    environment:
      - MONGO_INITDB_DATABASE=exam_bureau_db
    networks:
      - exam-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: exam-backend
    restart: always
    ports:
      - "8001:8001"
    environment:
      - MONGO_URL=mongodb://mongodb:27017
      - DB_NAME_EXAM=exam_bureau_db
      - SECRET_KEY=exam-bureau-secret-2024-production
      - CORS_ORIGINS=http://localhost:3000,http://localhost
      - SMTP_EMAIL=noreply@tecsrilanka.com.lk
      - SMTP_PASSWORD=Hkust2026!'
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - exam-network
    volumes:
      - backend_uploads:/app/backend/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: exam-frontend
    restart: always
    ports:
      - "3000:80"
    environment:
      - REACT_APP_BACKEND_URL=http://localhost:8001
    depends_on:
      - backend
    networks:
      - exam-network

volumes:
  mongodb_data:
    driver: local
  mongodb_config:
    driver: local
  backend_uploads:
    driver: local

networks:
  exam-network:
    driver: bridge
